spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/examflow
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        model: claude-sonnet-4-5
        max-tokens: 2048

app:
  jwt:
    secret: ${ziko1234}
    expiration: 86400000

  upload:
    dir: ${UPLOAD_DIR:/var/uploads/examflow}

